// Define read_json function directly here
function read_json($filePath) {
    if (!file_exists($filePath)) {
        return [];
    }
    $json = file_get_contents($filePath);
    return json_decode($json, true) ?? [];
}

$loanTypes = read_json('data/loan_types.json');
